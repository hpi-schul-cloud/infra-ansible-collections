---
privacyidea_version: "3.8.1"
privacyidea_packages:
    - python3-venv
    - python3-pip
    - nginx
    - libmysqlclient-dev # provide the necessary header files and libraries for building and compiling other software that needs to interface with MySQL/MariaDB.
    - mariadb-client

privacyidea_dir: "/opt/privacyidea"
ansible_python_interpreter: /usr/bin/python3
server_name: "privacyidea.infra.dev.spsh.dbildungsplattform.de"

privacyidea_mariadb_private_ip: ""
terraform_variables:
  privacyidea_mariadb_password: ""
  privacyidea_mariadb_username: ""