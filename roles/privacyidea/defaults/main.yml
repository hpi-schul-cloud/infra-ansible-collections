#privacyidea_dir: "{{ lookup('env', 'HOME') }}/privacyidea"
privacyidea_dir: "/opt/privacyidea_env"
ansible_python_interpreter: /usr/bin/python3
server_name: "privacyidea.infra.dev.spsh.dbildungsplattform.de"